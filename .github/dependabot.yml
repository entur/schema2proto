version: 2
updates:
  - package-ecosystem: maven
    directories:
      - "/"
    cooldown:
      default-days: 7
      exclude:
        - "no.entur.*"
        - "org.entur.*"
        - "io.entur.*"
    ignore:
      # Stay on Kotlin 2.3.x — allow patch updates only, block minor/major bumps beyond 2.3. Required to run codeQL
      - dependency-name: "org.jetbrains.kotlin:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      entur-dependencies:
        patterns:
          - "no.entur*"
          - "org.entur*"
        update-types:
          - "patch"
          - "minor"
    schedule:
      interval: "daily"

  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "entur/*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "actions/*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: "daily"
